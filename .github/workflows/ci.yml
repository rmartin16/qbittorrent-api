name: Release Tests

on:
  schedule:
    - cron: 16 6 * * *
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  workflow_call:
    inputs:
      attest:
        description: "Attest the created package using GitHub attestations."
        default: "false"
        type: string
      run-dev-tests:
        description: "Whether to run tests for development versions of qBittorrent"
        default: "true"
        type: string

# cancels running CI if new commit is pushed to branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LATEST_PYTHON_VER: 3.14
  LATEST_QBT_VER: v5.2.3
  QBITTORRENTAPI_HOST: localhost:8080
  QBITTORRENTAPI_USERNAME: admin
  QBITTORRENTAPI_PASSWORD: adminadmin
  FORCE_COLOR: 1

jobs:
  verify:
    name: Get Ready
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      python-latest-version: ${{ env.LATEST_PYTHON_VER }}
      qbittorrent-latest-version: ${{ env.LATEST_QBT_VER }}
      qbittorrent-host: ${{ env.QBITTORRENTAPI_HOST }}
      qbittorrent-username: ${{ env.QBITTORRENTAPI_USERNAME }}
      qbittorrent-password: ${{ env.QBITTORRENTAPI_PASSWORD }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ env.LATEST_PYTHON_VER }}
          enable-cache: true

      - name: Install
        run: uv sync

      - name: Cache pre-commit
        uses: actions/cache@v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Lint
        run: uv run pre-commit run --all-files --show-diff-on-failure --color=always

  package:
    #######
    # Verify build and packaging is successful
    #######
    name: Build & Verify Package
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0  # Fetch all refs so setuptools_scm can generate the correct version number

      - name: Build & Upload Package
        uses: hynek/build-and-inspect-python-package@v2.18.0
        with:
          attest-build-provenance-github: ${{ inputs.attest }}

  Tests-qBittorrent:
    name: Release Test ${{ needs.verify.outputs.python-latest-version }} - ${{ matrix.QBT_VER }}
    needs: [ verify, package ]
    strategy:
      matrix:
        QBT_VER:
          - v5.1.4
          - v5.0.5
          - v4.6.7
          - v4.4.4
          - v4.3.9
          - v4.3.5
          - v4.3.4.1
          - v4.3.3
          - v4.3.2
          - v4.3.1
          - v4.3.0.1
          - v4.2.5
          - v4.2.0
          - v4.1.6
          - v4.1.0
    uses: ./.github/workflows/test.yml
    secrets: inherit
    with:
      python-version: ${{ needs.verify.outputs.python-latest-version }}
      qbittorrent-version: ${{ matrix.QBT_VER }}
      qbittorrent-host: ${{ needs.verify.outputs.qbittorrent-host }}
      qbittorrent-username: ${{ needs.verify.outputs.qbittorrent-username }}
      qbittorrent-password: ${{ needs.verify.outputs.qbittorrent-password }}
      is-qbt-dev: false

  Tests-qBittorrent-dev:
    name: Release Test ${{ needs.verify.outputs.python-latest-version }} - ${{ matrix.QBT_VER }}
    needs: [ verify, package ]
    if: inputs.run-dev-tests != 'false'
    strategy:
      matrix:
        QBT_VER: [ "master", "v5_2_x", "v5_1_x", "v5_0_x", "v4_6_x" ]
    uses: ./.github/workflows/test.yml
    secrets: inherit
    with:
      python-version: ${{ needs.verify.outputs.python-latest-version }}
      qbittorrent-version: ${{ matrix.QBT_VER }}
      qbittorrent-host: ${{ needs.verify.outputs.qbittorrent-host }}
      qbittorrent-username: ${{ needs.verify.outputs.qbittorrent-username }}
      qbittorrent-password: ${{ needs.verify.outputs.qbittorrent-password }}
      is-qbt-dev: true

  Tests-Python:
    name: Release Test ${{ matrix.PYTHON_VER }} - ${{ needs.verify.outputs.qbittorrent-latest-version }}
    needs: [ verify, package ]
    strategy:
      matrix:
        PYTHON_VER: [ "3.15", "3.14", "3.13", "3.12", "3.11", "3.10" ]
    uses: ./.github/workflows/test.yml
    secrets: inherit
    with:
      python-version: ${{ matrix.PYTHON_VER }}
      qbittorrent-version: ${{ needs.verify.outputs.qbittorrent-latest-version }}
      qbittorrent-host: ${{ needs.verify.outputs.qbittorrent-host }}
      qbittorrent-username: ${{ needs.verify.outputs.qbittorrent-username }}
      qbittorrent-password: ${{ needs.verify.outputs.qbittorrent-password }}
      is-qbt-dev: false

  coverage:
    name: Combine & Check Coverage
    runs-on: ubuntu-latest
    needs: [ Tests-qBittorrent, Tests-Python ]
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync

      - name: Retrieve coverage data
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: coverage-data-*
          merge-multiple: true

      - name: Combine coverage
        run: uv run coverage combine

      - name: Generate coverage report
        id: coverage
        run: |
          uv run coverage html --skip-covered --skip-empty
          uv run coverage xml
          uv run coverage report --fail-under=100

      - name: Upload HTML coverage report
        if: always() && steps.coverage.outcome == 'failure'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: html-coverage-report
          path: ./htmlcov

      - name: Upload Coverage to Codecov
        if: contains(fromJson('["push", "pull_request"]'), github.event_name)
        uses: codecov/codecov-action@v7.0.0
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  install-dev:
    #######
    # Verify package can be installed on all platforms
    #######
    name: Verify Dev Install
    needs: [ verify ]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ env.LATEST_PYTHON_VER }}
          enable-cache: true

      - name: Install in Dev Mode
        run: uv sync

      - name: Import Package
        run: uv run python -c "from qbittorrentapi import Client; assert Client().host == 'localhost:8080'"
